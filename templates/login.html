<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Collabrix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background bubbles */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-100px) rotate(180deg); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            padding: 45px;
            margin: 20px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .logo p {
            color: #888;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .input-icon {
            position: relative;
        }

        .input-icon input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e8e8e8;
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .input-icon input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .input-icon .icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Ripple effect */
        .btn-login::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-login:active::after {
            width: 300px;
            height: 300px;
        }

        .error {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 500;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .demo-info {
            background: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 100%);
            padding: 15px;
            border-radius: 14px;
            margin: 20px 0;
            text-align: center;
        }

        .demo-info strong {
            color: #667eea;
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .demo-info code {
            background: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #764ba2;
            display: inline-block;
            margin: 3px;
        }

        .register-link {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e8e8e8;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
        }

        .register-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .register-link a:hover::after {
            width: 100%;
        }

        .register-link a:hover {
            color: #764ba2;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            font-size: 11px;
            color: #aaa;
            flex-wrap: wrap;
        }

        .features span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                padding: 30px 25px;
                margin: 15px;
            }
            .logo h1 {
                font-size: 28px;
            }
            .features {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated bubbles -->
    <div class="bubble" style="width: 200px; height: 200px; top: -50px; left: -50px; animation-duration: 15s;"></div>
    <div class="bubble" style="width: 150px; height: 150px; bottom: -30px; right: -30px; animation-duration: 25s;"></div>
    <div class="bubble" style="width: 100px; height: 100px; top: 30%; right: 10%; animation-duration: 18s;"></div>
    <div class="bubble" style="width: 80px; height: 80px; bottom: 20%; left: 5%; animation-duration: 22s;"></div>
    <div class="bubble" style="width: 120px; height: 120px; top: 60%; left: 20%; animation-duration: 20s;"></div>

    <div class="login-container">
        <div class="logo">
            <h1>✨ Collabrix ✨</h1>
            <p>Welcome back! Login to continue</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>📧 Email Address</label>
                <div class="input-icon">
                    <span class="icon">✉️</span>
                    <input type="email" name="email" placeholder="Enter your email" required value="demo@collabrix.com">
                </div>
            </div>

            <div class="form-group">
                <label>🔒 Password</label>
                <div class="input-icon">
                    <span class="icon">🔑</span>
                    <input type="password" name="password" placeholder="Enter your password" required value="demo123">
                </div>
            </div>

            <button type="submit" class="btn-login">
                🎯 Login to Dashboard →
            </button>
        </form>

        <div class="demo-info">
            <strong>✨ Demo Credentials ✨</strong><br>
            <code>demo@collabrix.com</code> / <code>demo123</code>
        </div>

        <div class="register-link">
            🚀 New to Collabrix? <a href="/register">Create your free account →</a>
        </div>

        <div class="features">
            <span>✅ Unlimited Projects</span>
            <span>💬 Team Chat</span>
            <span>📊 Kanban Board</span>
            <span>🎯 Free Forever</span>
        </div>
    </div>

    <script>
        // Add ripple effect to button
        const btn = document.querySelector('.btn-login');
        btn.addEventListener('click', function(e) {
            let ripple = document.createElement('span');
            ripple.classList.add('ripple');
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
    </script>

    <style>
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }
        
        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
        
        .btn-login {
            position: relative;
            overflow: hidden;
        }
    </style>
</body>
</html>
